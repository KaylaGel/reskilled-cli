<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 254 56">
  <g transform="translate(10, 8)" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Left branch — pink -->
    <line x1="4"  y1="4" x2="14" y2="18" stroke="#E91E63"/>
    <circle cx="4"  cy="4" r="2.5" fill="#E91E63" stroke="none"/>

    <!-- Right branch — yellow -->
    <line x1="24" y1="4" x2="14" y2="18" stroke="#CC8800"/>
    <circle cx="24" cy="4" r="2.5" fill="#CC8800" stroke="none"/>

    <!-- Merge node — blue (the convergence point) -->
    <circle cx="14" cy="18" r="3.5" fill="#2979FF" stroke="none"/>

    <!-- Output trunk — blue (the result) -->
    <line x1="14" y1="18" x2="14" y2="36" stroke="#2979FF"/>
    <circle cx="14" cy="36" r="2.5" fill="#2979FF" stroke="none"/>
  </g>

  <!-- Vertical separator -->
  <line x1="52" y1="10" x2="52" y2="46" stroke="#D0D7DE" stroke-width="1"/>

  <!-- re in pink, skilled in dark -->
  <text y="37">
    <tspan x="64"
           font-family="'Courier New', Consolas, 'Lucida Console', monospace"
           font-size="22"
           fill="#E91E63">re</tspan><tspan
           font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
           font-weight="700"
           font-size="26"
           fill="#1F2328">skilled</tspan>
  </text>
</svg>
